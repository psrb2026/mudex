<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudex Motorista</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; background: #f5f6fa; }
        .header { background: #27ae60; color: white; padding: 20px; text-align: center; }
        .card { background: white; margin: 20px 0; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .button { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; }
        .info { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 MUDEX MOTORISTA</h1>
    </div>
    
    <div class="card" style="text-align: center;">
        <h2>Status: <span style="color: #e74c3c;">Offline</span></h2>
        <button class="button" onclick="goOnline()">FICAR ONLINE</button>
    </div>
    
    <div class="card info">
        <p>💰 Ganhos Hoje: <strong>R$ 0,00</strong></p>
        <p>🚗 Corridas: <strong>0</strong></p>
        <p>⭐ Avaliação: <strong>5.0</strong></p>
    </div>
    
    <p style="text-align: center; color: #95a5a6;">API: 192.168.15.6:3000</p>

    <script>
        function goOnline() {
            fetch('http://192.168.15.6:3000/health')
                .then(r => r.json())
                .then(data => alert('Backend OK: ' + data.status))
                .catch(e => alert('Erro: ' + e));
        }
    </script>
</body>
</html>
