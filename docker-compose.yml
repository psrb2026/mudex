version: '3.8'

services:
  # INFRAESTRUTURA
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mudex-postgres
    environment:
      POSTGRES_USER: mudex
      POSTGRES_PASSWORD: mudex123
      POSTGRES_DB: mudex_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudex -d mudex_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mudex-redis

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mudex-rabbitmq

  # GATEWAY
  api-gateway:
    build: ./api-gateway
    container_name: mudex-api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - user-service
      - ride-service
      - location-service

  # SERVIÇOS
  auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: ./services/user-service
    container_name: mudex-user-service
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=mudex
      - DB_PASSWORD=mudex123
      - DB_NAME=mudex_db
      - DB_DIALECT=postgres
    depends_on:
      postgres:
        condition: service_healthy

  ride-service:
    build: ./services/ride-service
    container_name: mudex-ride-service
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build: ./services/payment-service
    container_name: mudex-payment-service
    depends_on:
      postgres:
        condition: service_healthy

  location-service:
    build: ./services/location-service
    container_name: mudex-location-service
    depends_on:
      postgres:
        condition: service_healthy

  dispatch-service:
    build: ./services/dispatch-service
    container_name: mudex-dispatch-service
    depends_on:
      - rabbitmq

  notification-service:
    build: ./services/notification-service
    container_name: mudex-notification-service
    depends_on:
      - rabbitmq

  analytics-service:
    build: ./services/analytics-service
    container_name: mudex-analytics-service
    depends_on:
      postgres:
        condition: service_healthy
