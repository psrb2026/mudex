version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mudex-postgres
    environment:
      POSTGRES_USER: mudex
      POSTGRES_PASSWORD: mudex123
      POSTGRES_DB: mudex_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudex -d mudex_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mudex-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service
    restart: always
    environment:
      - DB_HOST=mudex-postgres
      - REDIS_URL=redis://mudex-redis:6379
      - JWT_SECRET=mudex_super_secret
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  api-gateway:
    build: ./api-gateway
    container_name: mudex-api-gateway
    ports:
      - "3000:3000"
    restart: always
    environment:
      - AUTH_SERVICE_URL=http://mudex-auth-service:3001
      - USER_SERVICE_URL=http://mudex-user-service:3002
      - JWT_SECRET=mudex_super_secret
    depends_on:
      - auth-service

networks:
  default:
    name: mudex_network
