version: '3.8'

services:
  mudex-postgres:
    image: postgis/postgis:16-3.4
    container_name: mudex-postgres
    environment:
      POSTGRES_USER: mudex
      POSTGRES_PASSWORD: mudex123
      POSTGRES_DB: mudex_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudex -d mudex_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Comando para criar o banco de dados faltante que está dando erro 502
    command: >
      sh -c "docker-entrypoint.sh postgres & 
      sleep 10;
      psql -U mudex -d mudex_db -c 'CREATE DATABASE mudex_users;' || true;
      wait"

  mudex-redis:
    image: redis:7-alpine
    container_name: mudex-redis
    ports:
      - "6379:6379"

  mudex-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mudex-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  mudex-auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service
    environment:
      - PORT=3001
      - DB_HOST=mudex-postgres
      - REDIS_URL=redis://mudex-redis:6379
    depends_on:
      - mudex-postgres

  mudex-user-service:
    build: ./services/user-service
    container_name: mudex-user-service
    environment:
      - PORT=3002
      - DB_HOST=mudex-postgres
      - REDIS_URL=redis://mudex-redis:6379
    depends_on:
      - mudex-postgres

  mudex-api-gateway:
    build: ./api-gateway
    container_name: mudex-api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - mudex-auth-service
      - mudex-user-service
