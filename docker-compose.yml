version: '3.8'

services:
  mudex-postgres:
    image: postgis/postgis:16-3.4
    container_name: mudex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mudex
      POSTGRES_PASSWORD: mudex123
      POSTGRES_DB: mudex_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudex -d mudex_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mudex-redis:
    image: redis:7-alpine
    container_name: mudex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mudex-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mudex-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mudex-auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_HOST=mudex-postgres
      - REDIS_URL=redis://mudex-redis:6379
    depends_on:
      mudex-postgres:
        condition: service_healthy
      mudex-redis:
        condition: service_healthy
    healthcheck:   # ajuste conforme seu serviço tenha /health
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]  # ou /ready se existir
      interval: 10s
      timeout: 5s
      retries: 5

  mudex-user-service:
    build: ./services/user-service
    container_name: mudex-user-service
    restart: unless-stopped
    environment:
      - PORT=3002
      - DB_HOST=mudex-postgres
      - REDIS_URL=redis://mudex-redis:6379
    depends_on:
      mudex-postgres:
        condition: service_healthy
      mudex-redis:
        condition: service_healthy
    healthcheck:   # ajuste se tiver endpoint de health
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mudex-api-gateway:
    build: ./api-gateway
    container_name: mudex-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mudex-auth-service
      - mudex-user-service
    # Se quiser mais segurança, pode adicionar healthcheck aqui também

networks:
  default:
    name: mudex-network

volumes:
  postgres_data:
