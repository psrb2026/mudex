version: '3.8'

services:
  # INFRAESTRUTURA CENTRAL
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mudex-postgres
    environment:
      POSTGRES_USER: mudex
      POSTGRES_PASSWORD: mudex123
      POSTGRES_DB: mudex_db
    networks:
      mudex_network:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudex -d mudex_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mudex-redis
    networks:
      mudex_network:
        aliases:
          - redis

  # EXEMPLO DE SERVIÇO (Repita este padrão para os outros 12)
  auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service
    restart: always
    environment:
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
    networks:
      mudex_network:
        aliases:
          - auth-service
    depends_on:
      postgres: { condition: service_healthy }

  # API GATEWAY (O ÚNICO QUE EXPOSTO PARA O MUNDO)
  api-gateway:
    build: ./api-gateway
    container_name: mudex-api-gateway
    ports:
      - "3000:3000"
    restart: always
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      # Adicione as URLs de todos os serviços aqui usando os aliases
    networks:
      - mudex_network
    depends_on:
      - auth-service

networks:
  mudex_network:
    name: mudex_network
    driver: bridge
