cat <<EOF > /workspaces/mudex/docker-compose.yml
version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mudex-postgres
    environment:
      POSTGRES_USER: mudex
      POSTGRES_PASSWORD: mudex123
      POSTGRES_DB: mudex_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudex -d mudex_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mudex-redis

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mudex-rabbitmq

  api-gateway:
    build:
      context: ./api-gateway
    container_name: mudex-api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - user-service

  auth-service:
    build:
      context: ./services/auth-service
    container_name: mudex-auth-service
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: ./services/user-service
    container_name: mudex-user-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: mudex
      DB_PASSWORD: mudex123
      DB_NAME: mudex_db
    depends_on:
      postgres:
        condition: service_healthy
EOF
