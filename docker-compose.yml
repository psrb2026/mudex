version: '3.8'

services:
  # O BANCO DE DADOS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mudex-postgres
    environment:
      POSTGRES_USER: mudex
      POSTGRES_PASSWORD: mudex123
      POSTGRES_DB: mudex_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudex -d mudex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # O SERVIÇO DE AUTENTICAÇÃO
  auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service
    restart: always
    depends_on:
      postgres: { condition: service_healthy }

  # O PORTEIRO (API GATEWAY) - É aqui que o seu link conecta!
  auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service  # <-- ESTE NOME É O SEGREDO
    restart: always
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      - auth-service
