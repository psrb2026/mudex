version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mudex-postgres
    environment:
      POSTGRES_USER: mudex
      POSTGRES_PASSWORD: mudex123
      POSTGRES_DB: mudex_db
    ports:
      - "5432:5432"
    networks:
      default:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudex -d mudex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mudex-redis
    ports:
      - "6379:6379"
    networks:
      default:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mudex-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      default:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=mudex_super_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3001"
    command: sh -c "npm install && npm start"

  location-service:
    build: ./services/location-service
    container_name: mudex-location-service
    environment:
      - PORT=3005
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=mudex_super_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3005"
    command: sh -c "npm install && npm start"

  api-gateway:
    build: ./api-gateway
    container_name: mudex-api-gateway
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - LOCATION_SERVICE_URL=http://location-service:3005
      - USER_SERVICE_URL=http://user-service:3002
      - RIDE_SERVICE_URL=http://ride-service:3003
      - DISPATCH_SERVICE_URL=http://dispatch-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - ANALYTICS_SERVICE_URL=http://analytics-service:3008
      - JWT_SECRET=mudex_super_secret
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - location-service

networks:
  default:
    name: mudex_network

volumes:
  postgres_data:
