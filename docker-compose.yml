services:
  # ... (mantenha postgres, redis e rabbitmq como estão)

  auth-service:
    build: ./services/auth-service
    container_name: mudex-auth-service
    restart: always
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3001" # <-- ISSO PRECISA APARECER NO DOCKER PS
    networks:
      mudex_network:
        aliases:
          - auth-service
    depends_on:
      postgres: { condition: service_healthy }

  user-service:
    build: ./services/user-service
    container_name: mudex-user-service
    restart: always
    environment:
      - PORT=3002
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
    ports:
      - "3002:3002"
    networks:
      mudex_network:
        aliases:
          - user-service
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    # O comando abaixo evita que o serviço morra se faltar o node_modules
    command: sh -c "npm install && npm start" 

  api-gateway:
    build: ./api-gateway
    container_name: mudex-api-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
    networks:
      - mudex_network
